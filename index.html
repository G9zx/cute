<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ซองจดหมายน่ารัก 💌</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffeef8 0%, #ffdfef 50%, #ffe8f5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Floating flowers decoration */
        .flower-decoration {
            position: absolute;
            opacity: 0.3;
            pointer-events: none;
            animation: float 6s ease-in-out infinite;
        }

        .flower-1 {
            top: 10%;
            left: 15%;
            font-size: 40px;
            animation-delay: 0s;
        }

        .flower-2 {
            top: 20%;
            right: 10%;
            font-size: 35px;
            animation-delay: 1s;
        }

        .flower-3 {
            bottom: 15%;
            left: 10%;
            font-size: 45px;
            animation-delay: 2s;
        }

        .flower-4 {
            bottom: 20%;
            right: 15%;
            font-size: 38px;
            animation-delay: 3s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        .container {
            position: relative;
            width: 400px;
            height: 500px;
            perspective: 1000px;
        }

        .envelope-wrapper {
            position: absolute;
            width: 100%;
            height: 100%;
            transition: transform 0.6s ease;
        }

        .envelope-wrapper.opened {
            transform: translateY(50px);
        }

        .envelope {
            position: relative;
            width: 350px;
            height: 250px;
            margin: 0 auto;
            cursor: pointer;
            transform-style: preserve-3d;
        }

        .envelope-base {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ffd6e8 0%, #ffb3d9 100%);
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.3);
        }

        .envelope-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform-origin: top center;
            transition: transform 0.8s ease;
            z-index: 10;
        }

        .envelope-flap-top {
            position: absolute;
            width: 0;
            height: 0;
            border-left: 175px solid transparent;
            border-right: 175px solid transparent;
            border-top: 125px solid #ffb3d9;
            border-radius: 10px 10px 0 0;
        }

        .envelope-flap-shadow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.1), transparent);
            border-radius: 10px;
        }

        .envelope.opened .envelope-flap {
            transform: rotateX(-180deg);
        }

        .tap-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff1493;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.8);
            z-index: 999;
            pointer-events: none;
            animation: pulse 2s ease-in-out infinite;
            text-align: center;
        }

        @keyframes pulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-50%, -50%) scale(1.1); }
        }

        .envelope.opened .tap-text {
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        /* Heart decorations on envelope */
        .heart-decoration {
            position: absolute;
            color: #ff69b4;
            opacity: 0.6;
            pointer-events: none;
        }

        .heart-1 {
            top: 20px;
            left: 30px;
            font-size: 20px;
        }

        .heart-2 {
            top: 30px;
            right: 40px;
            font-size: 25px;
        }

        .heart-3 {
            bottom: 30px;
            left: 50px;
            font-size: 18px;
        }

        .heart-4 {
            bottom: 40px;
            right: 30px;
            font-size: 22px;
        }

        /* Letter paper */
        .letter-paper {
            position: absolute;
            width: 600px;
            height: 800px;
            background: transparent;
            top: 50%;
            left: 50%;
            transform: translate(-50%, 100%) scale(0.3) rotate(5deg);
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .letter-paper.show {
            transform: translate(-50%, -50%) scale(1) rotate(0deg);
            opacity: 1;
        }

        .letter-content {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .letter-content img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(255, 105, 180, 0.5);
            background: white;
        }

        /* Close button */
        .close-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 30px;
            height: 30px;
            background: #ff69b4;
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            line-height: 30px;
            text-align: center;
            z-index: 100;
            box-shadow: 0 4px 8px rgba(255, 105, 180, 0.3);
            transition: transform 0.2s ease;
        }

        .close-btn:hover {
            transform: scale(1.1);
            background: #ff1493;
        }

        /* Scrollbar styling */
        .letter-content::-webkit-scrollbar {
            width: 8px;
        }

        .letter-content::-webkit-scrollbar-track {
            background: #ffe8f5;
            border-radius: 10px;
        }

        .letter-content::-webkit-scrollbar-thumb {
            background: #ffb3d9;
            border-radius: 10px;
        }

        .letter-content::-webkit-scrollbar-thumb:hover {
            background: #ff69b4;
        }

        /* Flower bouquet decorations */
        .bouquet {
            position: absolute;
            font-size: 80px;
            opacity: 0.7;
            pointer-events: none;
            z-index: 5;
            animation: bouquetFloat 4s ease-in-out infinite;
        }

        .bouquet-left {
            bottom: 50px;
            left: -100px;
            transform: rotate(-15deg);
        }

        .bouquet-right {
            bottom: 50px;
            right: -100px;
            transform: rotate(15deg);
            animation-delay: 1s;
        }

        @keyframes bouquetFloat {
            0%, 100% { transform: translateY(0px) rotate(-15deg); }
            50% { transform: translateY(-15px) rotate(-10deg); }
        }

        .bouquet-right {
            animation-name: bouquetFloatRight;
        }

        @keyframes bouquetFloatRight {
            0%, 100% { transform: translateY(0px) rotate(15deg); }
            50% { transform: translateY(-15px) rotate(10deg); }
        }
    </style>
</head>
<body>
    <!-- Floating flower decorations -->
    <div class="flower-decoration flower-1">🌸</div>
    <div class="flower-decoration flower-2">🌺</div>
    <div class="flower-decoration flower-3">🌷</div>
    <div class="flower-decoration flower-4">🌹</div>

    <div class="container">
        <!-- Flower Bouquets beside envelope -->
        <div class="bouquet bouquet-left">💐</div>
        <div class="bouquet bouquet-right">💐</div>

        <!-- Letter Paper -->
        <div class="letter-paper" id="letterPaper">
            <button class="close-btn" onclick="closeLetter()">×</button>
            <div class="letter-content" id="letterContent">
                <img src="letter.jpg" alt="จดหมาย" id="letterImage" onerror="tryAlternativeImages()" style="display:none;">
                <div id="selectImagePrompt" style="display:none; text-align:center; padding: 50px; color: #ff69b4;">
                    <h2 style="margin-bottom: 20px;">📝 กรุณาเลือกรูปจดหมาย</h2>
                    <p style="margin-bottom: 30px; line-height: 1.8;">
                        บันทึกรูปจดหมายที่ส่งมาเป็น<br>
                        <strong>letter.jpg</strong>, <strong>letter.png</strong>, หรือ <strong>letter.jpeg</strong><br>
                        วางไว้ในโฟลเดอร์เดียวกัน<br><br>
                        หรือคลิกปุ่มด้านล่าง
                    </p>
                    <button onclick="document.getElementById('fileInput').click()" style="background: linear-gradient(135deg, #ff69b4, #ff1493); color: white; border: none; padding: 15px 40px; border-radius: 25px; font-size: 18px; cursor: pointer; box-shadow: 0 4px 15px rgba(255, 105, 180, 0.4);">
                        📁 เลือกรูปจดหมาย
                    </button>
                </div>
            </div>
        </div>

        <!-- Hidden file input -->
        <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="loadSelectedImage(event)">

        <!-- Envelope -->
        <div class="envelope-wrapper" id="envelopeWrapper">
            <div class="envelope" id="envelope" onclick="openEnvelope()">
                <div class="envelope-base">
                    <div class="heart-decoration heart-1">💕</div>
                    <div class="heart-decoration heart-2">💝</div>
                    <div class="heart-decoration heart-3">💖</div>
                    <div class="heart-decoration heart-4">💗</div>
                </div>
                
                <div class="tap-text">
                    ✨ แตะเพื่อเปิด ✨
                </div>
                
                <div class="envelope-flap">
                    <div class="envelope-flap-top"></div>
                    <div class="envelope-flap-shadow"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isOpened = false;
        let imagePrompted = false;
        let imageLoaded = false;
        let currentImageIndex = 0;
        const imageExtensions = ['jpg', 'jpeg', 'png', 'gif', 'webp', 'JPG', 'JPEG', 'PNG', 'GIF', 'WEBP'];

        function tryAlternativeImages() {
            const img = document.getElementById('letterImage');
            
            if (currentImageIndex < imageExtensions.length) {
                img.src = `letter.${imageExtensions[currentImageIndex]}`;
                currentImageIndex++;
            } else {
                // No image found, show selection prompt
                img.style.display = 'none';
                document.getElementById('selectImagePrompt').style.display = 'block';
                imagePrompted = true;
            }
        }

        function loadSelectedImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById('letterImage');
                    img.src = e.target.result;
                    img.style.display = 'block';
                    img.onerror = null;
                    document.getElementById('selectImagePrompt').style.display = 'none';
                    imageLoaded = true;
                    imagePrompted = false;
                }
                reader.readAsDataURL(file);
            }
        }

        // Check if image loaded successfully
        document.getElementById('letterImage').onload = function() {
            this.style.display = 'block';
            imageLoaded = true;
        };

        function openEnvelope() {
            if (!isOpened) {
                isOpened = true;
                document.getElementById('envelope').classList.add('opened');
                document.getElementById('envelopeWrapper').classList.add('opened');
                
                setTimeout(() => {
                    document.getElementById('letterPaper').classList.add('show');
                }, 400);
            }
        }

        function closeLetter() {
            document.getElementById('letterPaper').classList.remove('show');
            
            setTimeout(() => {
                document.getElementById('envelope').classList.remove('opened');
                document.getElementById('envelopeWrapper').classList.remove('opened');
                isOpened = false;
            }, 300);
        }

        // Add some sparkle effect on mouse move
        document.addEventListener('mousemove', (e) => {
            if (Math.random() > 0.95) {
                const sparkle = document.createElement('div');
                sparkle.innerHTML = '✨';
                sparkle.style.position = 'absolute';
                sparkle.style.left = e.pageX + 'px';
                sparkle.style.top = e.pageY + 'px';
                sparkle.style.fontSize = '12px';
                sparkle.style.pointerEvents = 'none';
                sparkle.style.animation = 'sparkleFloat 1s ease-out forwards';
                document.body.appendChild(sparkle);
                
                setTimeout(() => sparkle.remove(), 1000);
            }
        });

        // Sparkle animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes sparkleFloat {
                0% {
                    opacity: 1;
                    transform: translateY(0) scale(1);
                }
                100% {
                    opacity: 0;
                    transform: translateY(-30px) scale(0.5);
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
